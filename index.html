<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="create a simple design for a website using html and css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/normalize.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <!-- start offcanvas -->
    <div class="offcanvas">
        <i class="fas fa-sun sun"></i>
        <div class="colors">
            <h3>Choose colors</h3>
            <ul>
                <li data-color = "red"></li>
                <li data-color = "green"></li>
                <li data-color = "blue"></li>
                <li data-color = "yellow"></li>
                <li data-color = "purple"></li>
            </ul>
        </div>
        <div class="customize-background">
            <h3>Customize BackGround Image</h3>
            <div class="buttons">
                <button class="random disabled" disabled>Random</button>
                <button class="stop">Stop</button>
            </div>
        </div>
    </div>
    <!-- end offcanvas -->
    <!-- start Landing -->
    <div class="landing">
        <header>
            <div class="container">
                <h1 class="navbar-brand">Special Design</h1>
                <i class="fas fa-bars burger-icon"></i>
                <ul class="navbar">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#products">Products</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </header>
        <div class="home" id="home">
            <h3>We are <span>creative</span>Agency</h3>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ipsa dolores quam atque suscipit. Aut esse aperiam odio velit, dicta incidunt nulla mollitia?</p>
        </div>
    </div>
    <!-- end Landing -->
    <script src="app.js"></script>
</body>
</html>
